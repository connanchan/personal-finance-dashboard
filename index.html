<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Personal Finance Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>

body{
font-family:Arial, Helvetica, sans-serif;
max-width:1100px;
margin:auto;
padding:16px;
}

h1,h2{
text-align:center;
}

.section{
margin-bottom:28px;
padding:14px;
border:1px solid #eee;
border-radius:8px;
}

button{
padding:10px 14px;
margin-top:8px;
cursor:pointer;
border-radius:6px;
border:1px solid #ccc;
background:#f5f5f5;
}

input,select{
padding:8px;
margin-top:6px;
margin-right:6px;
border-radius:6px;
border:1px solid #ccc;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th,td{
border:1px solid #ddd;
padding:6px;
font-size:14px;
}

th{
background:#f0f0f0;
}

.progressbar{
height:14px;
background:#eee;
border-radius:6px;
}

.progressfill{
height:14px;
background:#4caf50;
border-radius:6px;
}

#loginPage{
text-align:center;
margin-top:120px;
}

/* MOBILE OPTIMIZATION */

@media (max-width:700px){

body{
padding:10px;
}

.section{
padding:10px;
}

input,select{
width:100%;
margin-bottom:6px;
}

button{
width:100%;
}

th,td{
font-size:12px;
}

}

</style>
</head>
<body>

<!-- LOGIN PAGE -->

<div id="loginPage">
<h1>Personal Finance Dashboard</h1>
<p>Please login</p>
<button onclick="login()">Login with Google</button>
</div>


<!-- DASHBOARD -->

<div id="dashboard" style="display:none">

<h1>Finance Dashboard</h1>

<p id="userStatus" style="text-align:center"></p>

<div style="text-align:center;margin-bottom:20px">
<button onclick="logout()">Logout</button>
</div>


<div class="section">

<h2>Add Paycheck</h2>

<input id="payInput" type="number" placeholder="Paycheck amount">
<button onclick="addPay()">Add</button>

<p>Total Income: $<span id="incomeTotal">0</span></p>

</div>


<div class="section">

<h2>Categories</h2>

<div id="categoryList"></div>

<input id="newCat" placeholder="New category">
<button onclick="addCategory()">Add Category</button>

</div>


<div class="section">

<h2>Add Spending</h2>

<select id="catSelect"></select>

<input id="spendInput" type="number" placeholder="Amount">

<button onclick="addSpend()">Add</button>

<table>
<thead>
<tr>
<th>Category</th>
<th>Amount</th>
<th>Date</th>
</tr>
</thead>
<tbody id="log"></tbody>
</table>

</div>


<div class="section">

<h2>Net Worth</h2>

<input id="tfsa" type="number" placeholder="TFSA">
<input id="rrsp" type="number" placeholder="RRSP">
<input id="cash" type="number" placeholder="Cash">

<button onclick="updateNW()">Update Net Worth</button>

<p>Net Worth: $<span id="nw">0</span></p>

</div>


<div class="section">

<h2>Category Spending Chart</h2>

<canvas id="chart"></canvas>

</div>

</div>


<script>

let paychecks=[]
let categories=[]
let transactions={}
let netWorth=0
let lastUpdated=0


function saveLocal(){

localStorage.setItem("paychecks",JSON.stringify(paychecks))
localStorage.setItem("categories",JSON.stringify(categories))
localStorage.setItem("transactions",JSON.stringify(transactions))
localStorage.setItem("netWorth",netWorth)
localStorage.setItem("lastUpdated",lastUpdated)

}


function save(){

lastUpdated=Date.now()

saveLocal()

if(window.saveCloud){
window.saveCloud()
}

}


function loadLocal(){

paychecks=JSON.parse(localStorage.getItem("paychecks"))||[]
categories=JSON.parse(localStorage.getItem("categories"))||[]
transactions=JSON.parse(localStorage.getItem("transactions"))||{}
netWorth=parseFloat(localStorage.getItem("netWorth"))||0
lastUpdated=parseFloat(localStorage.getItem("lastUpdated"))||0

}


function addPay(){

let v=parseFloat(document.getElementById("payInput").value)

if(!isNaN(v)){

paychecks.push(v)

update()

save()

}

}


function addCategory(){

let c=document.getElementById("newCat").value

if(!c) return

categories.push(c)

transactions[c]=[]

renderCats()

save()

}


function renderCats(){

let div=document.getElementById("categoryList")

div.innerHTML=""

categories.forEach(c=>{

let d=document.createElement("div")

d.innerText=c

div.appendChild(d)

})

let sel=document.getElementById("catSelect")

sel.innerHTML=""

categories.forEach(c=>{

let o=document.createElement("option")

o.text=c

sel.add(o)

})

}


function addSpend(){

let cat=document.getElementById("catSelect").value

let amt=parseFloat(document.getElementById("spendInput").value)

if(!transactions[cat]) transactions[cat]=[]

transactions[cat].push(amt)

let row=document.getElementById("log").insertRow(0)

row.insertCell(0).innerText=cat
row.insertCell(1).innerText="$"+amt
row.insertCell(2).innerText=new Date().toLocaleString()

update()

save()

}


function totalIncome(){

return paychecks.reduce((a,b)=>a+b,0)

}


function update(){

document.getElementById("incomeTotal").innerText=totalIncome()

renderChart()

}


function updateNW(){

let tfsa=parseFloat(document.getElementById("tfsa").value)||0
let rrsp=parseFloat(document.getElementById("rrsp").value)||0
let cash=parseFloat(document.getElementById("cash").value)||0

netWorth=tfsa+rrsp+cash

document.getElementById("nw").innerText=netWorth

save()

}


function renderChart(){

let labels=[]
let data=[]

categories.forEach(c=>{

labels.push(c)

data.push((transactions[c]||[]).reduce((a,b)=>a+b,0))

})

let ctx=document.getElementById("chart")

if(window.chart) window.chart.destroy()

window.chart=new Chart(ctx,{
type:"bar",
data:{labels,datasets:[{label:"Spending",data}]}
})

}


loadLocal()
renderCats()
update()

</script>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js"

import {
getAuth,
GoogleAuthProvider,
signInWithPopup,
signOut,
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js"

import {
getFirestore,
doc,
setDoc,
getDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js"


const firebaseConfig={

apiKey:"AIzaSyAmyvGEgkcCH-nJpKSpp3IKsGmzpPFm0vs",

authDomain:"personal-finance-dashboa-a6862.firebaseapp.com",

projectId:"personal-finance-dashboa-a6862",

storageBucket:"personal-finance-dashboa-a6862.appspot.com",

messagingSenderId:"85821532999",

appId:"1:85821532999:web:3c4d8b8213844be0a8ba62"

}


const app=initializeApp(firebaseConfig)

const auth=getAuth(app)

const db=getFirestore(app)


window.login=async()=>{

const provider=new GoogleAuthProvider()

await signInWithPopup(auth,provider)

}


window.logout=async()=>{

await signOut(auth)

}


onAuthStateChanged(auth,async user=>{

if(user){

document.getElementById("loginPage").style.display="none"

document.getElementById("dashboard").style.display="block"

document.getElementById("userStatus").innerText="Logged in: "+user.email


const ref=doc(db,"users",user.uid)

const snap=await getDoc(ref)


if(snap.exists()){

const data=snap.data()

if(data.lastUpdated>lastUpdated){

paychecks=data.paychecks||[]

categories=data.categories||[]

transactions=data.transactions||{}

netWorth=data.netWorth||0

lastUpdated=data.lastUpdated||0

renderCats()

update()

}

}


window.saveCloud=async()=>{

await setDoc(doc(db,"users",user.uid),{

paychecks,

categories,

transactions,

netWorth,

lastUpdated

})

}

}else{

document.getElementById("loginPage").style.display="block"

document.getElementById("dashboard").style.display="none"

}

})

</script>


</body>
</html>
